<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가타카나 바이브 체크!</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #6c5ce7;
            --success: #00b894;
            --error: #ff7675;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        .char-display {
            font-size: 8rem;
            font-weight: bold;
            color: var(--primary);
            margin: 20px 0;
            transition: transform 0.2s;
        }

        input {
            width: 80%;
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .score {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #636e72;
        }

        .feedback {
            height: 20px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Katakana Vibe</h2>
    <div class="char-display" id="char">?</div>
    <div class="feedback" id="feedback"></div>
    <input type="text" id="answer" placeholder="발음을 입력해봐 (ex: a)" autofocus autocomplete="off">
    <div class="score">맞힌 개수: <span id="count">0</span></div>
</div>

<script>
    const katakana = [
        {k: 'ア', r: 'a'}, {k: 'イ', r: 'i'}, {k: 'ウ', r: 'u'}, {k: 'エ', r: 'e'}, {k: 'オ', r: 'o'},
        {k: 'カ', r: 'ka'}, {k: 'キ', r: 'ki'}, {k: 'ク', r: 'ku'}, {k: 'ケ', r: 'ke'}, {k: 'ko', r: 'ko'},
        {k: 'サ', r: 'sa'}, {k: 'シ', r: 'shi'}, {k: 'ス', r: 'su'}, {k: 'セ', r: 'se'}, {k: 'ソ', r: 'so'},
        {k: 'タ', r: 'ta'}, {k: 'チ', r: 'chi'}, {k: 'ツ', r: 'tsu'}, {k: 'テ', r: 'te'}, {k: 'ト', r: 'to'},
        {k: 'ナ', r: 'na'}, {k: 'ニ', r: 'ni'}, {k: 'ヌ', r: 'nu'}, {k: 'ネ', r: 'ne'}, {k: 'ノ', r: 'no'},
        {k: 'ハ', r: 'ha'}, {k: 'ヒ', r: 'hi'}, {k: 'フ', r: 'fu'}, {k: 'ヘ', r: 'he'}, {k: 'ホ', r: 'ho'},
        {k: 'マ', r: 'ma'}, {k: 'ミ', r: 'mi'}, {k: 'ム', r: 'mu'}, {k: '메', r: 'me'}, {k: 'モ', r: 'mo'},
        {k: 'ヤ', r: 'ya'}, {k: 'ユ', r: 'yu'}, {k: 'ヨ', r: 'yo'},
        {k: 'ラ', r: 'ra'}, {k: '리', r: 'ri'}, {k: 'ル', r: 'ru'}, {k: '레', r: 're'}, {k: '로', r: 'ro'},
        {k: 'ワ', r: 'wa'}, {k: 'ヲ', r: 'wo'}, {k: 'ン', r: 'n'}
    ];

    let currentItem;
    let score = 0;

    const charEl = document.getElementById('char');
    const inputEl = document.getElementById('answer');
    const feedbackEl = document.getElementById('feedback');
    const countEl = document.getElementById('count');

    function nextQuestion() {
        currentItem = katakana[Math.floor(Math.random() * katakana.length)];
        charEl.textContent = currentItem.k;
        inputEl.value = '';
    }

    inputEl.addEventListener('input', (e) => {
        const userValue = e.target.value.toLowerCase();
        
        if (userValue === currentItem.r) {
            score++;
            countEl.textContent = score;
            feedbackEl.textContent = "Great! ✨";
            feedbackEl.style.color = "var(--success)";
            
            // 정답일 때 살짝 커지는 효과
            charEl.style.transform = "scale(1.1)";
            setTimeout(() => {
                charEl.style.transform = "scale(1)";
                feedbackEl.textContent = "";
                nextQuestion();
            }, 500);
        }
    });

    // 시작
    nextQuestion();
</script>

</body>
</html>
